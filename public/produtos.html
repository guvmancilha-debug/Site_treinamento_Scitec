<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidware - Produtos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="page">
        <div class="logo_principal">
            <img class="logo" src="imagens/logo.png" alt="Logo Voidware">
            <a class="titulo" href="index.html">Voidware</a>
        </div>

        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="produtos.html" class="ativo">Produtos</a>
            <a href="sobre.html">Sobre nós</a>
            <a href="contato.html">Contato</a>
        </nav>

        <a class="carrinho-link" href="carrinho.html">
            Carrinho <span class="carrinho-contador" id="contador-carrinho">0</span>
        </a>
    </header>

    <h1 style="padding: 0 2rem;">Nossos produtos</h1>

    <!-- Filtros: por tipo de produto e por preço -->
    <section class="filtros">
        <fieldset>
            <legend>Tipo de produto</legend>

            <label>
                <input type="radio" name="tipo" value="todos" checked>
                Todos
            </label>

            <label>
                <input type="radio" name="tipo" value="fone">
                Fone
            </label>

            <label>
                <input type="radio" name="tipo" value="mouse">
                Mouse
            </label>

            <label>
                <input type="radio" name="tipo" value="teclado">
                Teclado
            </label>
        </fieldset>

        <fieldset>
            <legend>Ordenar por preço</legend>

            <label>
                <input type="radio" name="ordenar" value="padrao" checked>
                Padrão
            </label>

            <label>
                <input type="radio" name="ordenar" value="mais-caro">
                Mais caro primeiro
            </label>

            <label>
                <input type="radio" name="ordenar" value="mais-barato">
                Mais barato primeiro
            </label>
        </fieldset>
    </section>

    <!-- Os cards de produto são montados dinamicamente pelo produtos.js -->
    <section class="lista-produtos" id="lista-produtos">
        <p>Carregando produtos...</p>
    </section>

    <footer>
        <p>Voidware &copy; 2026 - Projeto SciTec Jr</p>
    </footer>

    <script src="js/carrinho.js"></script>
    <script src="js/produtos.js"></script>
</body>
</html>
