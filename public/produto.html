<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidware - Produto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="page">
        <div class="logo_principal">
            <img class="logo" src="imagens/logo.png" alt="Logo Voidware">
            <a class="titulo" href="index.html">Voidware</a>
        </div>

        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="produtos.html" class="ativo">Produtos</a>
            <a href="sobre.html">Sobre nós</a>
            <a href="contato.html">Contato</a>
        </nav>

        <a class="carrinho-link" href="carrinho.html">
            Carrinho <span class="carrinho-contador" id="contador-carrinho">0</span>
        </a>
    </header>

    <main id="produto-container">
        <section class="produto-detalhe">

            <!-- A mesma imagem é reaproveitada para as 3 cores.
                 A diferença de cor é só um filtro CSS (classe trocada via JS). -->
            <div class="produto-imagem">
                <img id="produto-imagem" src="" alt="Imagem do produto">
            </div>

            <div class="produto-info">
                <h1 id="produto-nome">Carregando...</h1>
                <p id="produto-preco"></p>
                <p id="produto-descricao"></p>

                <div>
                    <p>Cor:</p>
                    <div class="cores-opcoes" id="cores-opcoes">
                        <!-- bolinhas de cor montadas via JS -->
                    </div>
                </div>

                <div>
                    <p>Quantidade:</p>
                    <button onclick="alterarQuantidadeSelecionada(-1)">-</button>
                    <input id="quantidade-selecionada" type="number" value="1" min="1" style="width: 3rem; text-align: center;">
                    <button onclick="alterarQuantidadeSelecionada(1)">+</button>
                </div>

                <button onclick="adicionarProdutoAoCarrinho()">Adicionar ao carrinho</button>

                <p id="aviso-adicionado" style="display:none; color: lightgreen;"></p>
            </div>

        </section>
    </main>

    <footer>
        <p>Voidware &copy; 2026 - Projeto SciTec Jr</p>
    </footer>

    <script src="js/carrinho.js"></script>
    <script src="js/produto.js"></script>
</body>
</html>
